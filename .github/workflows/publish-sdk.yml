name: Publish SDK to NPM

on:
  push:
    paths:
      - 'wx-auth-sdk/**'
    branches: [main]
  workflow_dispatch:

# 防止版本号回写后循环触发
concurrency:
  group: publish-sdk
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: cd wx-auth-sdk && npm install

      - name: Bump version from npm registry
        run: |
          cd wx-auth-sdk
          CURRENT=$(npm view wx-auth-sdk version 2>/dev/null || echo "0.0.0")
          echo "线上最新版本: $CURRENT"
          NEXT=$(echo "$CURRENT" | awk -F. '{$NF=$NF+1}1' OFS=.)
          echo "发布版本: $NEXT"
          npm version "$NEXT" --no-git-tag-version

      - name: Build SDK
        run: cd wx-auth-sdk && npm run build

      - name: Publish to NPM
        run: cd wx-auth-sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version bump
        run: git push
