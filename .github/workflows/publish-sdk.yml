name: Publish SDK to NPM

on:
  push:
    paths:
      - 'wx-auth-sdk/**'
    branches: [main]
  workflow_dispatch:

# 防止版本号回写后循环触发
concurrency:
  group: publish-sdk
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          always-auth: false
          check-latest: false

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: cd wx-auth-sdk && pnpm install

      - name: Bump version
        run: cd wx-auth-sdk && npm version patch

      - name: Build SDK
        run: cd wx-auth-sdk && pnpm build

      - name: Publish to NPM
        run: cd wx-auth-sdk && npm publish --provenance --access public

      - name: Push version bump
        run: git push
