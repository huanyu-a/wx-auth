name: Publish SDK to NPM

on:
  push:
    paths:
      - 'wx-auth-sdk/**'
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: cd wx-auth-sdk && pnpm install

      - name: Build SDK
        run: cd wx-auth-sdk && pnpm build

      - name: Publish to NPM
        run: cd wx-auth-sdk && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
