name: Publish SDK to NPM

on:
  push:
    paths:
      - 'wx-auth-sdk/**'
    branches: [main]
  workflow_dispatch:

# 防止版本号回写后循环触发
concurrency:
  group: publish-sdk
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          always-auth: false
          check-latest: false

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: cd wx-auth-sdk && pnpm install

      - name: Get latest NPM version
        id: get-version
        run: |
          cd wx-auth-sdk
          # 获取 NPM 上的最新版本
          LATEST_VERSION=$(npm view wx-auth-sdk version 2>/dev/null || echo "0.0.0")
          echo "Latest NPM version: $LATEST_VERSION"

          # 解析版本号并升级
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "New version: $NEW_VERSION"

          # 设置 GitHub Actions 输出
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bumped=$NEW_VERSION" >> $GITHUB_ENV

      - name: Bump version
        run: |
          cd wx-auth-sdk
          npm version ${{ steps.get-version.outputs.version }} --no-git-tag-version
          echo "Bumped to $(node -p "require('./package.json').version")"

      - name: Build SDK
        run: cd wx-auth-sdk && pnpm build

      - name: Publish to NPM
        run: cd wx-auth-sdk && npm publish --provenance --access public

      - name: Push version bump
        run: git push
