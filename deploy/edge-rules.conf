# =============================================================
# wx-auth 边缘拦截规则（OpenResty / Nginx）
# -------------------------------------------------------------
# 用途：在请求进入 Docker 容器（Nuxt SSR）之前，直接丢弃扫描器流量，
#       连一次 SSR 连接都不建立。与 server/middleware/silent-drop.ts 同源。
#
# 放置位置：复制以下内容，粘贴到站点 server { } 内、
#           现有 "location / { proxy_pass ... }" 之前即可。
#
# 处置方式：全部 return 444 —— 直接关闭 TCP 连接、不返回任何响应，
#           比 silent-drop 的空 200 更隐蔽（扫描器连 RST/超时都难判断）。
#
# 安全说明：以下规则只匹配"应用绝不提供的路径"（脚本扩展名、WP、密钥文件），
#           不会误伤真实路由 /、/admin、/sdk、/_nuxt、/api/auth|wechat|sdk|admin。
#           /api/* 的细粒度白名单已在应用层 silent-drop 实现，边缘无需重复。
# =============================================================

# 1) 双斜杠畸形路径（//wp-admin、//7.php 等）
#    必须用 $request_uri（原始 URI）才能捕获双斜杠，普通 location 会被归一化
if ($request_uri ~* "^//") {
    return 444;
}

# 2) 服务端脚本扩展名（应用是 Nuxt，绝不提供 .php/.asp/.jsp...）
location ~* \.(php|phtml|php3|php4|php5|pht|asp|aspx|jsp|jspx|do|action|cgi|pl|py|sh|rb|cfm|cfc)$ {
    return 444;
}

# 3) WordPress / 常见 CMS 路径盲扫
location ~* ^/(wp-admin|wp-content|wp-includes|wp-json|wp-login|xmlrpc\.php) {
    return 444;
}

# 4) 密钥 / 凭证 / 备份文件（任意位置的 .env、云厂商凭证、证书/key、tfstate 等）
location ~* (\.env(\.|$)|/\.aws/|/\.azure/|/\.kube/|/\.terraform/|/\.amplify/|/\.github/|/\.git(/|$)|/\.ssh/|/credentials/|/secrets/|\.pem$|\.key$|\.keystore|id_rsa|\.npmrc|aws/credentials|terraform\.tfstate|\.tfvars|/\.serverless/) {
    return 444;
}
