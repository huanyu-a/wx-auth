server {
    listen 80;
    listen [::]:80;
    server_name wx-auth.bx9y.com.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wx-auth.bx9y.com.cn;
    root /www/dk_project/wwwroot/wx-auth.bx9y.com.cn;

    # SSL
    ssl_certificate /www/server/panel/vhost/cert/wx-auth.bx9y.com.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/wx-auth.bx9y.com.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /.well-known {
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:6702;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    access_log /www/wwwlogs/wx-auth.bx9y.com.cn.log;
    error_log /www/wwwlogs/wx-auth.bx9y.com.cn.error.log;
}
